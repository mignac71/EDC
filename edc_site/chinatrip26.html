<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>China Trip 2026 | Live Program</title>
  <link rel="manifest" href="chinatrip26.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./images/chinatrip26-icon.svg" />
  <style>
    :root {
      color-scheme: light;
      --font-scale: 1;
      --bg: #f4f7fc;
      --bg-grad-1: #f8fbff;
      --bg-grad-2: #edf2fb;
      --card: #fff;
      --text: #162137;
      --muted: #607089;
      --line: #d8e1ee;
      --accent: #0f5ee0;
      --accent-soft: #e9f1ff;
      --ok: #0f9d58;
      --warn: #dc8b00;
      --current-bg: #e9f8ef;
      --next-bg: #fff5e2;
      --current-text: #0e6f41;
      --next-text: #9b6200;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1524;
      --bg-grad-1: #10182a;
      --bg-grad-2: #0e1420;
      --card: #172238;
      --text: #eaf0ff;
      --muted: #b7c3db;
      --line: #29354e;
      --accent: #6ea8ff;
      --accent-soft: #213357;
      --ok: #3bc878;
      --warn: #ffbc49;
      --current-bg: #19382c;
      --next-bg: #3e2d14;
      --current-text: #7ee3a6;
      --next-text: #ffd485;
    }

    * { box-sizing: border-box; }
    html { font-size: calc(16px * var(--font-scale)); }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 1rem;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
      line-height: 1.45;
      padding-top: 3.5rem;
    }

    .container { width: min(1100px, 100% - 2rem); margin: 0 auto; padding: 1rem 0 2.5rem; }
    .hero, .card, .day { background: var(--card); border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 6px 20px rgba(18, 34, 70, 0.05); }
    .hero { padding: 1rem; margin-bottom: .8rem; }

    .floating-top {
      position: fixed;
      top: .45rem;
      left: 50%;
      transform: translateX(-50%);
      width: min(1100px, calc(100% - 1.4rem));
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .55rem;
      background: color-mix(in srgb, var(--card), transparent 8%);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: .35rem .45rem;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(18, 34, 70, 0.12);
    }
    .floating-line {
      display: flex;
      align-items: center;
      gap: .5rem;
      min-width: 0;
      flex: 1;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
    }
    .floating-chip {
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: .35rem .55rem;
      min-width: 0;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .04rem;
    }
    .floating-chip strong {
      display: block;
      font-size: .66rem;
      font-weight: 700;
      letter-spacing: .01em;
      color: var(--muted);
      line-height: 1.1;
    }
    .floating-chip .floating-time {
      font-size: 1.58rem;
      font-weight: 800;
      letter-spacing: .02em;
      line-height: 1;
    }

    .topbar { display: flex; flex-wrap: wrap; gap: .45rem; align-items: center; justify-content: space-between; margin-bottom: .6rem; }
    .push-consent {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
      margin: 0 0 .8rem;
      padding: .55rem .7rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: color-mix(in srgb, var(--card), var(--accent-soft) 45%);
    }
    .push-consent.open { display: flex; }
    .push-consent .tiny { margin: 0; }
    .controls { display: flex; flex-wrap: wrap; gap: .35rem; }
    .map-link {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      text-decoration: none;
      font-weight: 600;
    }
    button, .chip {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      border-radius: 999px;
      padding: .34rem .64rem;
      font-size: .86rem;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    .btn-active { background: var(--accent-soft); border-color: var(--accent); }

    h1 { margin: .2rem 0; font-size: clamp(1.45rem, 3vw, 2.3rem); }
    .sub { color: var(--muted); margin: .3rem 0 .75rem; font-size: 1.08rem; }
    .settings-menu { position: relative; }
    .settings-menu summary {
      list-style: none;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      border-radius: 10px;
      padding: .28rem .5rem;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      user-select: none;
    }
    .settings-menu summary::-webkit-details-marker { display: none; }
    .settings-panel {
      position: absolute;
      right: 0;
      top: calc(100% + .35rem);
      z-index: 30;
      width: min(92vw, 450px);
      padding: .7rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      box-shadow: 0 10px 24px rgba(18, 34, 70, 0.12);
      display: grid;
      gap: .6rem;
    }
    .settings-group { display: flex; flex-wrap: wrap; gap: .35rem; align-items: center; }
    .settings-label { font-size: .85rem; color: var(--muted); width: 100%; margin-bottom: .1rem; }
    .tiny { color: var(--muted); font-size: .88rem; margin: .2rem 0; }

    .pull-refresh { position: fixed; top: 3.35rem; left: 50%; transform: translate(-50%, -140%); transition: transform .2s ease; padding: .35rem .6rem; border-radius: 999px; border: 1px solid var(--line); background: var(--card); color: var(--muted); font-size: .8rem; z-index: 60; box-shadow: 0 6px 18px rgba(18, 34, 70, 0.12); }
    .pull-refresh.visible { transform: translate(-50%, 0); }

    .status-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: .7rem; margin-bottom: .9rem; }
    .card { padding: .85rem; }
    .card h2 { margin: 0 0 .35rem; font-size: 1rem; }
    .badge { display:inline-block; font-size:.76rem; font-weight:700; text-transform:uppercase; border-radius:999px; padding:.2rem .55rem; margin-bottom:.42rem; }
    .b-current { background: var(--current-bg); color: var(--current-text); }
    .b-next { background: var(--next-bg); color: var(--next-text); }

    .timeline-meta { display: flex; justify-content: space-between; align-items: center; gap: .7rem; margin-bottom: .55rem; }
    .timeline { display: grid; gap: .8rem; }
    .day-head { padding: .72rem .9rem; border-bottom: 1px solid var(--line); font-weight: 700; background: color-mix(in srgb, var(--card), var(--accent-soft) 55%); }
    .item {
      display: grid;
      grid-template-columns: 128px 1fr;
      gap: .8rem;
      padding: .7rem .9rem;
      border-bottom: 1px solid color-mix(in srgb, var(--line), transparent 20%);
    }
    .item:last-child { border-bottom: 0; }
    .time { font-weight: 700; color: var(--accent); }
    .title { font-weight: 700; margin-bottom: .1rem; }
    .title-row { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
    .entity-icon { font-size: 1rem; }
    .entity-logo {
      width: 1.1rem;
      height: 1.1rem;
      object-fit: contain;
      border-radius: 4px;
      border: 1px solid color-mix(in srgb, var(--line), transparent 35%);
      background: #fff;
    }
    .desc { margin: .05rem 0; color: var(--muted); font-size: .9rem; }
    .entity-meta {
      margin-top: .35rem;
      display: flex;
      align-items: center;
      gap: .4rem;
      flex-wrap: wrap;
    }
    .entity-meta a { font-size: .82rem; color: var(--accent); text-decoration: none; }
    .entity-meta a:hover { text-decoration: underline; }
    .status-list { list-style: none; margin: .35rem 0 0; padding: 0; display: grid; gap: .35rem; }
    .status-list li { display: flex; justify-content: space-between; gap: .6rem; font-size: .88rem; }
    .status-list li strong { color: var(--ink); font-weight: 700; }
    .inline-links { display: flex; flex-wrap: wrap; gap: .45rem; margin-top: .45rem; }
    .inline-links a { font-size: .8rem; text-decoration: none; color: var(--brand); border: 1px solid var(--line); border-radius: 999px; padding: .2rem .55rem; }
    .info-link {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      margin-top: .25rem;
      border: none;
      background: transparent;
      color: var(--accent);
      font-weight: 600;
      padding: 0;
      border-radius: 0;
    }
    .info-link:hover { text-decoration: underline; border: none; }
    .current-item { border-left: 3px solid var(--ok); background: color-mix(in srgb, var(--card), var(--current-bg) 72%); }
    .next-item { border-left: 3px solid var(--warn); background: color-mix(in srgb, var(--card), var(--next-bg) 72%); }

    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: none; align-items: center; justify-content: center; padding: 1rem; z-index: 40;
    }
    .modal.open { display: flex; }
    .modal-box { width: min(720px, 100%); max-height: 82vh; overflow: auto; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 1rem; }
    .modal-box #modalText { white-space: pre-wrap; line-height: 1.55; }

    @media (max-width: 880px) {
      .status-grid { grid-template-columns: 1fr; }
      .item { grid-template-columns: 1fr; gap: .33rem; }
      .timeline-meta { flex-direction: column; align-items: flex-start; }
      .floating-top { padding: .3rem .35rem; }
      body { padding-top: 3.6rem; }
    }
  </style>
</head>

  <section class="floating-top" aria-live="polite">
    <div class="floating-line">
      <div class="floating-chip"><div class="floating-time" id="beijingNow">—</div><strong id="clockBeijingLabel"></strong></div>
      <div class="floating-chip"><div class="floating-time" id="berlinNow">—</div><strong id="clockBerlinLabel"></strong></div>
      <div class="floating-chip"><div class="floating-time" id="topCountdownValue">—</div><strong id="topCountdownLabel"></strong></div>
    </div>
    <details class="settings-menu">
      <summary id="settingsSummaryIcon" aria-label="Settings menu">☰</summary>
      <div class="settings-panel">
        <div class="settings-group">
          <span class="settings-label" id="langLabel"></span>
          <div class="controls" id="langButtons"></div>
        </div>
        <div class="settings-group">
          <span class="settings-label" id="fontLabel"></span>
          <button id="fontDown" type="button">A−</button>
          <button id="fontUp" type="button">A+</button>
        </div>
        <div class="settings-group">
          <span class="settings-label" id="appearanceLabel"></span>
          <button id="themeSystem" type="button">System</button>
          <button id="themeLight" type="button">Light</button>
          <button id="themeDark" type="button">Dark</button>
        </div>
        <div class="settings-group">
          <span class="settings-label" id="refreshLabel"></span>
          <button id="refreshSlow" type="button">Eco</button>
          <button id="refreshMedium" type="button">Balanced</button>
          <button id="refreshFast" type="button">Live</button>
        </div>
      </div>
    </details>
  </section>
  <div class="pull-refresh" id="pullRefreshStatus"></div>

  <main class="container">
    <section class="hero">
      <div class="push-consent" id="pushConsentBar" role="region" aria-live="polite">
        <p class="tiny" id="pushConsentText"></p>
        <div class="controls">
          <button id="pushConsentEnable" type="button"></button>
          <button id="pushConsentDismiss" type="button"></button>
        </div>
      </div>
      <div class="topbar">
        <div class="controls">
          <button id="toggleNowNext" type="button"></button>
          <button id="enableAlerts" type="button"></button>
          <button id="exportIcs" type="button"></button>
          <a id="autoChinaMapLink" class="chip map-link" href="http://www.beijingautoshow.com/wp-content/uploads/2026/04/halls.jpg" target="_blank" rel="noopener noreferrer"></a>
        </div>
      </div>
      <h1 id="pageTitle"></h1>
    </section>

    <section class="status-grid">
      <article class="card" hidden>
        <span class="badge b-current" id="badgeCurrent"></span>
        <h2 id="currentTitle">—</h2>
        <p class="tiny" id="currentTime">—</p>
        <p class="tiny" id="currentDesc">—</p>
      </article>
      <article class="card">
        <span class="badge b-next" id="badgeNext"></span>
        <h2 id="nextTitle">—</h2>
        <p class="tiny" id="nextTime">—</p>
        <p class="tiny" id="nextDesc">—</p>
      </article>
      <article class="card" id="flightLiveCard" hidden>
        <span class="badge" id="flightLiveBadge">Flight live</span>
        <h2 id="flightLiveTitle">CA1379 • PEK → CAN</h2>
        <ul class="status-list">
          <li><span id="flightStatusLabel"></span><strong id="flightStatusValue">—</strong></li>
          <li><span id="flightGateLabel"></span><strong id="flightGateValue">—</strong></li>
          <li><span id="flightDelayLabel"></span><strong id="flightDelayValue">—</strong></li>
          <li><span id="flightLiveRefreshLabel"></span><strong id="flightLiveRefreshValue">—</strong></li>
        </ul>
        <div class="inline-links">
          <a href="https://www.flightaware.com/live/flight/CCA1379" target="_blank" rel="noopener noreferrer" id="flightLinkTrack"></a>
          <a href="https://www.airchina.com.cn/en/" target="_blank" rel="noopener noreferrer" id="flightLinkCarrier"></a>
        </div>
      </article>
    </section>

    <div class="timeline-meta">
      <button type="button" id="togglePast"></button>
    </div>

    <section class="timeline" id="timeline"></section>
  </main>

  <div class="modal" id="detailsModal" aria-hidden="true">
    <div class="modal-box">
      <h3 id="modalTitle"></h3>
      <p id="modalText" class="desc"></p>
      <button type="button" id="closeModal">Close</button>
    </div>
  </div>

    };

    const parseInChina = (date, time) => {
      const [y,m,d] = date.split('-').map(Number);
      const [hh,mm] = time.split(':').map(Number);
      return Date.UTC(y, m-1, d, hh-8, mm, 0);
    };

    const buildNormalized = () => eventsEn.map((ev, idx) => {
      const translated = {
        ...ev,
        city: eventTranslations[lang]?.[ev.city] || ev.city,
        title: eventTranslations[lang]?.[ev.title] || ev.title,
        desc: ev.desc ? (eventTranslations[lang]?.[ev.desc] || ev.desc) : ''
      };
      return { ...translated, idx, start: parseInChina(ev.d, ev.t), end: parseInChina(ev.d, ev.e) };
    }).sort((a,b) => a.start - b.start);

    let lang = localStorage.getItem('china_trip_lang') || 'en';
    let showPast = false;
    let nowNextOnly = localStorage.getItem('china_trip_now_next_only') === '1';
    let refreshMode = localStorage.getItem('china_trip_refresh_mode') || 'medium';
    let refreshTimerId = null;
    let flightRefreshTimerId = null;
    const scheduledAlertKeys = new Set();
    let pushPromptDismissed = localStorage.getItem('china_trip_push_prompt_dismissed') === '1';
    let flightLiveState = { status: '', depGate: '', depTerminal: '', delayMinutes: null, updatedAtIso: '' };
    const flightLiveEnabled = false;

    const formatDate = (ms, locale, tz) => new Intl.DateTimeFormat(locale, {
      timeZone: tz, weekday: 'long', year: 'numeric', month: 'long', day: '2-digit', hour: '2-digit', minute:'2-digit', second:'2-digit'
    }).format(ms);
    const formatClock = (ms, locale, tz) => new Intl.DateTimeFormat(locale, {
      timeZone: tz, hour: '2-digit', minute:'2-digit', hour12: false
    }).format(ms);

    const formatDay = (d, city, locale) => `${new Intl.DateTimeFormat(locale, { weekday:'long', day:'2-digit', month:'2-digit' }).format(new Date(`${d}T00:00:00Z`))} — ${city}`;
    const getCopy = () => i18n[lang] || i18n.en;

    function findCurrentAndNext(nowMs) {
      let current = null; let next = null;
      const normalized = buildNormalized();
      for (const ev of normalized) {
        if (nowMs >= ev.start && nowMs < ev.end) current = ev;
        if (!next && ev.start > nowMs) next = ev;
      }
      return { current, next };
    }

    const fmtRemaining = (ms) => {
      if (ms <= 0) return '0h 0m';
      const totalM = Math.floor(ms / 60000);
      return `${Math.floor(totalM/60)}h ${totalM%60}m`;
    };
    const fmtCountdownClock = (ms) => {
      if (ms <= 0) return '00:00';
      const totalM = Math.floor(ms / 60000);
      return `${String(Math.floor(totalM / 60)).padStart(2, '0')}:${String(totalM % 60).padStart(2, '0')}`;
    };

    const isLongDesc = (txt) => ((txt || '').trim().match(/[.!?](\s|$)/g) || []).length > 1;
    const detectEntity = (ev) => {
      const hay = `${ev.title} ${ev.desc || ''}`.toLowerCase();
      return entityCatalog.find((entity) => entity.aliases.some((alias) => hay.includes(alias)));
    };
    const getFlightEvent = () => eventsEn.find((ev) => ev.title.includes('Flight CA1379'));

    function openDetails(title, text) {
      const copy = getCopy();
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalText').textContent = text || '—';
      document.getElementById('closeModal').textContent = copy.close;
      document.getElementById('detailsModal').classList.add('open');
      document.getElementById('detailsModal').setAttribute('aria-hidden', 'false');
    }

    function buildTimeline(currentIdx, nextIdx, nowMs) {
      const copy = getCopy();
      const normalized = buildNormalized();
      const grouped = normalized.reduce((acc, ev) => {
        const k = `${ev.d}|${ev.city}`;
        (acc[k] ||= []).push(ev);
        return acc;
      }, {});

      const wrapper = document.getElementById('timeline');
      wrapper.innerHTML = '';

      Object.entries(grouped).forEach(([key, list]) => {
        const dayCard = document.createElement('article');
        dayCard.className = 'day';

        const [date, city] = key.split('|');
        const head = document.createElement('div');
        head.className = 'day-head';
        head.textContent = formatDay(date, city, lang);

        list.forEach(ev => {
          if (nowNextOnly && ev.idx !== currentIdx && ev.idx !== nextIdx) return;
          if (!showPast && ev.end < nowMs) return;
          const item = document.createElement('div');
          item.className = 'item';
          item.dataset.idx = ev.idx;
          if (ev.idx === currentIdx) item.classList.add('current-item');
          if (ev.idx === nextIdx) item.classList.add('next-item');

          const descText = ev.desc || '—';
          const entity = detectEntity(ev);
          const entityInfo = entity ? (entityInfoTranslations[lang]?.[entity.id] || entity.info) : '';
          const titleText = entity ? `${entity.icon} ${ev.title}` : ev.title;
          const needsDetails = Boolean(entity) || isLongDesc(descText);
          const short = entity ? `${descText}${descText && descText !== '—' ? ' ' : ''}` : (needsDetails ? `${descText.split(/[.!?]/)[0]}.` : descText);
          const detailsText = entity
            ? `${entityInfo}${entity?.type === 'company' && entity?.website ? `\n\n${copy.companyWebsite}: ${entity.website}` : ''}${entityInfo && descText && descText !== '—' ? '\n\n' : ''}${descText && descText !== '—' ? `${copy.programContext}: ${descText}` : ''}`.trim()
            : descText;
          const detailsTitle = ev.title;
          const companyMeta = entity?.type === 'company' && entity?.website
            ? `<div class="entity-meta"><a href="${entity.website}" target="_blank" rel="noopener noreferrer">${copy.companyWebsite}: ${entity.website}</a></div>`
            : '';
          const companyLogoInTitle = '';

          item.innerHTML = `
            <div class="time">${ev.t}–${ev.e}</div>
            <div>
              <div class="title title-row">${companyLogoInTitle}<span>${titleText}</span></div>
              <p class="desc">${short}</p>
              ${companyMeta}
              ${needsDetails ? `<button type="button" class="info-link details-btn">${copy.moreInfo}</button>` : ''}
            </div>
          `;

          if (needsDetails) {
            item.querySelector('.details-btn').addEventListener('click', () => openDetails(detailsTitle, detailsText));
          }
          dayCard.appendChild(item);
        });

        if (dayCard.querySelector('.item')) {
          dayCard.insertBefore(head, dayCard.firstChild);
          wrapper.appendChild(dayCard);
        }
      });

      const toggle = document.getElementById('togglePast');
      toggle.textContent = showPast ? copy.hidePast : copy.showPast;
    }

    function applyThemeButtons(mode) {
      ['themeSystem','themeLight','themeDark'].forEach(id => document.getElementById(id).classList.remove('btn-active'));
      document.getElementById(mode === 'light' ? 'themeLight' : mode === 'dark' ? 'themeDark' : 'themeSystem').classList.add('btn-active');
    }

    function applyRefreshButtons(mode) {
      ['refreshSlow', 'refreshMedium', 'refreshFast'].forEach((id) => document.getElementById(id).classList.remove('btn-active'));
      const activeId = mode === 'slow' ? 'refreshSlow' : mode === 'fast' ? 'refreshFast' : 'refreshMedium';
      document.getElementById(activeId).classList.add('btn-active');
    }

    function getRefreshIntervalMs() {
      if (refreshMode === 'slow') return 5 * 60_000;
      if (refreshMode === 'fast') return 30_000;
      return 60_000;
    }

    function scheduleRefreshLoop() {
      if (refreshTimerId) {
        clearTimeout(refreshTimerId);
        refreshTimerId = null;
      }
      if (document.hidden) return;
      const interval = getRefreshIntervalMs();
      refreshTimerId = setTimeout(() => {
        refreshView(false);
        scheduleRefreshLoop();
      }, interval);
    }

    function refreshView(scrollWhenIdle = false) {
      const copy = getCopy();
      const now = Date.now();
      const { current, next } = findCurrentAndNext(now);

      document.documentElement.lang = lang;
      document.getElementById('pageTitle').textContent = copy.title;
      document.getElementById('badgeCurrent').textContent = copy.current;
      document.getElementById('badgeNext').textContent = copy.next;
      document.getElementById('clockBeijingLabel').textContent = copy.beijing;
      document.getElementById('clockBerlinLabel').textContent = copy.berlin;
      document.getElementById('topCountdownLabel').textContent = copy.shortCountdown;
      document.getElementById('beijingNow').textContent = formatClock(now, lang, 'Asia/Shanghai');
      document.getElementById('berlinNow').textContent = formatClock(now, lang, 'Europe/Berlin');
      document.getElementById('topCountdownValue').textContent = fmtCountdownClock(next ? next.start - now : 0);
      document.getElementById('toggleNowNext').textContent = nowNextOnly ? copy.nowNextOnlyOn : copy.nowNextOnlyOff;
      document.getElementById('exportIcs').textContent = copy.exportIcs;
      document.getElementById('autoChinaMapLink').textContent = copy.mapAccess;
      const alertsBtn = document.getElementById('enableAlerts');
      const pushConsentBar = document.getElementById('pushConsentBar');
      if (!('Notification' in window)) {
        alertsBtn.textContent = copy.alertsBlocked;
        alertsBtn.disabled = true;
        pushConsentBar.classList.remove('open');
      } else {
        alertsBtn.disabled = false;
        alertsBtn.textContent =
          Notification.permission === 'granted' ? copy.alertsOn : Notification.permission === 'denied' ? copy.alertsBlocked : copy.enableAlerts;
        document.getElementById('pushConsentText').textContent = copy.pushConsentText;
        document.getElementById('pushConsentEnable').textContent = copy.pushConsentEnable;
        document.getElementById('pushConsentDismiss').textContent = copy.pushConsentDismiss;
        const shouldShowPushPrompt = Notification.permission === 'default' && !pushPromptDismissed;
        pushConsentBar.classList.toggle('open', shouldShowPushPrompt);
      }
      document.getElementById('themeSystem').textContent = copy.themeSystem;
      document.getElementById('themeLight').textContent = copy.themeLight;
      document.getElementById('themeDark').textContent = copy.themeDark;
      document.getElementById('settingsSummaryIcon').setAttribute('aria-label', copy.settings);
      document.getElementById('settingsSummaryIcon').setAttribute('title', copy.settings);
      document.getElementById('langLabel').textContent = copy.language;
      document.getElementById('fontLabel').textContent = copy.fontSize;
      document.getElementById('appearanceLabel').textContent = copy.appearance;
      document.getElementById('refreshLabel').textContent = copy.refreshRate;
      document.getElementById('refreshSlow').textContent = copy.refreshSlow;
      document.getElementById('refreshMedium').textContent = copy.refreshMedium;
      document.getElementById('refreshFast').textContent = copy.refreshFast;
      if (flightLiveEnabled) {
        document.getElementById('flightLiveBadge').textContent = copy.flightLiveBadge;
        document.getElementById('flightStatusLabel').textContent = copy.flightStatusLabel;
        document.getElementById('flightGateLabel').textContent = copy.flightGateLabel;
        document.getElementById('flightDelayLabel').textContent = copy.flightDelayLabel;
        document.getElementById('flightLiveRefreshLabel').textContent = copy.flightLiveRefreshLabel;
        document.getElementById('flightLinkTrack').textContent = copy.flightLinkTrack;
        document.getElementById('flightLinkCarrier').textContent = copy.flightLinkCarrier;
      }
      updateFlightCardVisibility(now);
      if (flightLiveEnabled) renderFlightLiveCard();
      const pullRefreshStatus = document.getElementById('pullRefreshStatus');
      if (pullRefreshStatus && !pullRefreshStatus.classList.contains('visible')) pullRefreshStatus.textContent = copy.pullToRefreshHint;

      document.getElementById('currentTitle').textContent = current ? current.title : copy.noCurrent;
      document.getElementById('currentTime').textContent = current ? `${formatDay(current.d, current.city, lang)} | ${current.t}–${current.e}` : '';
      document.getElementById('currentDesc').textContent = current ? (current.desc || '—') : '';

      document.getElementById('nextTitle').textContent = next ? next.title : copy.noNext;
      document.getElementById('nextTime').textContent = next ? `${formatDay(next.d, next.city, lang)} | ${next.t}–${next.e}` : copy.noNext;
      document.getElementById('nextDesc').textContent = next ? (next.desc || '—') : copy.noNextDesc;

      buildTimeline(current?.idx, next?.idx, now);
      scheduleUpcomingNotifications(now);

      if (!current && next && scrollWhenIdle) {
        const nextEl = document.querySelector(`.item[data-idx="${next.idx}"]`);
        if (nextEl) nextEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    function formatFlightUpdateTime(iso) {
      if (!iso) return '—';
      const dt = new Date(iso);
      if (Number.isNaN(dt.getTime())) return '—';
      return new Intl.DateTimeFormat(lang, {
        timeZone: 'Asia/Shanghai',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      }).format(dt);
    }

    function renderFlightLiveCard() {
      const copy = getCopy();
      const statusText = flightLiveState.status || copy.flightStatusUnknown;
      const gateText = [flightLiveState.depGate, flightLiveState.depTerminal ? `T${flightLiveState.depTerminal}` : ''].filter(Boolean).join(' / ') || '—';
      let delayText = '—';
      if (typeof flightLiveState.delayMinutes === 'number') {
        delayText = flightLiveState.delayMinutes <= 0
          ? copy.flightDelayOnTime
          : copy.flightDelayLate.replace('{MIN}', String(flightLiveState.delayMinutes));
      }
      document.getElementById('flightStatusValue').textContent = statusText;
      document.getElementById('flightGateValue').textContent = gateText;
      document.getElementById('flightDelayValue').textContent = delayText;
      document.getElementById('flightLiveRefreshValue').textContent = formatFlightUpdateTime(flightLiveState.updatedAtIso);
    }

    function updateFlightCardVisibility(nowMs) {
      const flightCard = document.getElementById('flightLiveCard');
      if (!flightCard) return;
      if (!flightLiveEnabled) {
        flightCard.hidden = true;
        return;
      }
      const flightEvent = getFlightEvent();
      if (!flightEvent) {
        flightCard.hidden = false;
        return;
      }
      const flightEndMs = parseInChina(flightEvent.d, flightEvent.e);
      flightCard.hidden = nowMs > flightEndMs;
    }

    async function refreshFlightLiveStatus() {
      if (!flightLiveEnabled) return;
      const copy = getCopy();
      try {
        const response = await fetch(`./api/flight-ca1379-status.php?ts=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        if (!payload?.ok || !payload?.flight) throw new Error('Invalid payload');
        flightLiveState = {
          status: payload.flight.status || copy.flightStatusUnknown,
          depGate: payload.flight.departure_gate || '',
          depTerminal: payload.flight.departure_terminal || '',
          delayMinutes: typeof payload.flight.departure_delay_min === 'number' ? payload.flight.departure_delay_min : null,
          updatedAtIso: payload.fetched_at_utc || new Date().toISOString()
        };
      } catch (_) {
        flightLiveState = {
          ...flightLiveState,
          status: copy.flightDataUnavailable,
          updatedAtIso: new Date().toISOString()
        };
      }
      renderFlightLiveCard();
    }

    function scheduleFlightLiveLoop() {
      if (!flightLiveEnabled) return;
      if (flightRefreshTimerId) {
        clearTimeout(flightRefreshTimerId);
        flightRefreshTimerId = null;
      }
      if (document.hidden) return;
      flightRefreshTimerId = setTimeout(async () => {
        await refreshFlightLiveStatus();
        scheduleFlightLiveLoop();
      }, 5 * 60_000);
    }

    function setupLangButtons() {
      const wrap = document.getElementById('langButtons');
      wrap.innerHTML = '';
      Object.keys(i18n).forEach(k => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = `${i18n[k].flag} ${k.toUpperCase()}`;
        if (k === lang) btn.classList.add('btn-active');
        btn.addEventListener('click', () => {
          lang = k;
          localStorage.setItem('china_trip_lang', lang);
          setupLangButtons();
          refreshView(true);
        });
        wrap.appendChild(btn);
      });
    }

    setupLangButtons();
    document.getElementById('togglePast').addEventListener('click', () => { showPast = !showPast; refreshView(false); });
    document.getElementById('toggleNowNext').addEventListener('click', () => {
      nowNextOnly = !nowNextOnly;
      localStorage.setItem('china_trip_now_next_only', nowNextOnly ? '1' : '0');
      refreshView(false);
    });
    document.getElementById('closeModal').addEventListener('click', () => document.getElementById('detailsModal').classList.remove('open'));
    document.getElementById('detailsModal').addEventListener('click', (e) => { if (e.target.id === 'detailsModal') e.currentTarget.classList.remove('open'); });
    document.getElementById('enableAlerts').addEventListener('click', async () => {
      if (!('Notification' in window)) return;
      if (Notification.permission !== 'granted') await Notification.requestPermission();
      refreshView(false);
    });
    document.getElementById('pushConsentEnable').addEventListener('click', async () => {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'default') await Notification.requestPermission();
      pushPromptDismissed = true;
      localStorage.setItem('china_trip_push_prompt_dismissed', '1');
      refreshView(false);
    });
    document.getElementById('pushConsentDismiss').addEventListener('click', () => {
      pushPromptDismissed = true;
      localStorage.setItem('china_trip_push_prompt_dismissed', '1');
      refreshView(false);
    });

    let scale = Number(localStorage.getItem('china_trip_font_scale') || 1);
    const applyScale = () => { document.documentElement.style.setProperty('--font-scale', scale); };
    document.getElementById('fontUp').addEventListener('click', () => { scale = Math.min(1.3, +(scale + 0.05).toFixed(2)); localStorage.setItem('china_trip_font_scale', scale); applyScale(); });
    document.getElementById('fontDown').addEventListener('click', () => { scale = Math.max(0.85, +(scale - 0.05).toFixed(2)); localStorage.setItem('china_trip_font_scale', scale); applyScale(); });
    applyScale();

    const applyTheme = (mode) => {
      localStorage.setItem('china_trip_theme', mode);
      if (mode === 'system') document.documentElement.removeAttribute('data-theme');
      else document.documentElement.setAttribute('data-theme', mode);
      applyThemeButtons(mode);
    };
    document.getElementById('themeSystem').addEventListener('click', () => applyTheme('system'));
    document.getElementById('themeLight').addEventListener('click', () => applyTheme('light'));
    document.getElementById('themeDark').addEventListener('click', () => applyTheme('dark'));
    applyTheme(localStorage.getItem('china_trip_theme') || 'system');
    applyRefreshButtons(refreshMode);
    document.getElementById('refreshSlow').addEventListener('click', () => {
      refreshMode = 'slow';
      localStorage.setItem('china_trip_refresh_mode', refreshMode);
      applyRefreshButtons(refreshMode);
      scheduleRefreshLoop();
    });
    document.getElementById('refreshMedium').addEventListener('click', () => {
      refreshMode = 'medium';
      localStorage.setItem('china_trip_refresh_mode', refreshMode);
      applyRefreshButtons(refreshMode);
      scheduleRefreshLoop();
    });
    document.getElementById('refreshFast').addEventListener('click', () => {
      refreshMode = 'fast';
      localStorage.setItem('china_trip_refresh_mode', refreshMode);
      applyRefreshButtons(refreshMode);
      scheduleRefreshLoop();
    });

    function escapeIcs(text) {
      return String(text || '').replace(/\\/g, '\\\\').replace(/\n/g, '\\n').replace(/,/g, '\\,').replace(/;/g, '\\;');
    }

    function toIcsStamp(ms) {
      return new Date(ms).toISOString().replace(/[-:]/g, '').replace(/\.\d{3}Z$/, 'Z');
    }

    function downloadIcs() {
      const lines = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//EDC//ChinaTrip26//EN'
      ];
      const normalized = buildNormalized();
      normalized.forEach((ev) => {
        lines.push('BEGIN:VEVENT');
        lines.push(`UID:chinatrip26-${ev.idx}@edc`);
        lines.push(`DTSTAMP:${toIcsStamp(Date.now())}`);
        lines.push(`DTSTART:${toIcsStamp(ev.start)}`);
        lines.push(`DTEND:${toIcsStamp(ev.end)}`);
        lines.push(`SUMMARY:${escapeIcs(ev.title)}`);
        lines.push(`DESCRIPTION:${escapeIcs(ev.desc || '')}`);
        lines.push(`LOCATION:${escapeIcs(ev.city)}`);
        lines.push('END:VEVENT');
      });
      lines.push('END:VCALENDAR');
      const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'china-trip-2026.ics';
      a.click();
      URL.revokeObjectURL(url);
    }

    function scheduleUpcomingNotifications(nowMs) {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      const horizonMs = 1000 * 60 * 60 * 12;
      const reminderLeadMinutes = [15];
      const normalized = buildNormalized();
      normalized.forEach(ev => {
        if (ev.start < nowMs || ev.start - nowMs > horizonMs) return;
        reminderLeadMinutes.forEach(minBefore => {
          const fireAt = ev.start - (minBefore * 60 * 1000);
          if (fireAt <= nowMs) return;
          const key = `${ev.idx}-${minBefore}`;
          if (scheduledAlertKeys.has(key)) return;
          scheduledAlertKeys.add(key);
          setTimeout(() => {
            new Notification(`T-${minBefore} min: ${ev.title}`, {
              body: `${ev.t}–${ev.e} • ${ev.city}`
            });
          }, fireAt - nowMs);
        });
      });
    }

    document.getElementById('exportIcs').addEventListener('click', downloadIcs);


    async function refreshOfflineContent() {
      const copy = getCopy();
      const badge = document.getElementById('pullRefreshStatus');
      badge.textContent = copy.pullRefreshing;
      badge.classList.add('visible');
      try {
        if ('serviceWorker' in navigator) {
          const registration = await navigator.serviceWorker.ready;
          registration.active?.postMessage({ type: 'REFRESH_OFFLINE' });
        }
        await fetch('./chinatrip26.html', { cache: 'no-store' });
      } catch (_) {}
      refreshView(false);
      badge.textContent = copy.pullRefreshed;
      setTimeout(() => badge.classList.remove('visible'), 1200);
    }

    function setupPullToRefresh() {
      let startY = 0;
      let triggered = false;
      const threshold = 70;
      const badge = document.getElementById('pullRefreshStatus');
      const setHint = () => { badge.textContent = getCopy().pullToRefreshHint; };
      setHint();
      document.addEventListener('touchstart', (event) => {
        if (window.scrollY > 0) return;
        startY = event.touches[0].clientY;
        triggered = false;
        setHint();
      }, { passive: true });
      document.addEventListener('touchmove', (event) => {
        if (window.scrollY > 0 || !startY) return;
        const delta = event.touches[0].clientY - startY;
        if (delta > 18) badge.classList.add('visible');
        if (delta > threshold && !triggered) {
          triggered = true;
          refreshOfflineContent();
        }
      }, { passive: true });
      document.addEventListener('touchend', () => {
        startY = 0;
        if (!triggered) setTimeout(() => badge.classList.remove('visible'), 180);
      }, { passive: true });
    }

    async function initServiceWorker() {
      if (!('serviceWorker' in navigator)) return;

      let swVersion = String(Date.now());
      try {
        const response = await fetch('./api/chinatrip26-version.php', { cache: 'no-store' });
        if (response.ok) {
          const payload = await response.json();
          if (payload?.version) swVersion = payload.version;
        }
      } catch (_) {}

      navigator.serviceWorker.register(`./chinatrip26-sw.js?v=${encodeURIComponent(swVersion)}`).then((registration) => {
        registration.update().catch(() => {});

        if (registration.waiting) {
          registration.waiting.postMessage({ type: 'SKIP_WAITING' });
        }

        registration.addEventListener('updatefound', () => {
          const worker = registration.installing;
          if (!worker) return;
          worker.addEventListener('statechange', () => {
            if (worker.state === 'installed' && navigator.serviceWorker.controller) {
              worker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      }).catch(() => {});

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }

    initServiceWorker();
    setupPullToRefresh();
    refreshView(true);
    if (flightLiveEnabled) refreshFlightLiveStatus();
    scheduleRefreshLoop();
    if (flightLiveEnabled) scheduleFlightLiveLoop();
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) refreshView(false);
      if (!document.hidden && flightLiveEnabled) refreshFlightLiveStatus();
      scheduleRefreshLoop();
      if (flightLiveEnabled) scheduleFlightLiveLoop();
    }, { passive: true });
  </script>

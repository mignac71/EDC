<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Seating Plan | EDC Admin</title><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/admin/seating-plan/seating-plan.css"><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script><script src="/admin/seating-plan/js/types.js" defer></script><script src="/admin/seating-plan/js/data-store.js" defer></script><script src="/admin/seating-plan/js/import-export.js" defer></script><script src="/admin/seating-plan/js/seating-core.js" defer></script><script src="/admin/seating-plan/js/seating-plan.js" defer></script></head><body class="seating-admin"><main class="seating-shell"><section id="authPanel" class="auth-card"><img src="/images/edc_logo_final.png" alt="EDC"/><h1>Seating Plan</h1><p>Sign in with the existing CMS credentials to manage protected seating plans.</p><form id="authForm"><input id="authUser" autocomplete="username" placeholder="Username (optional for legacy password)"/><input id="authPassword" type="password" autocomplete="current-password" placeholder="Password" required/><button type="submit">Sign in</button><p id="authMessage" class="form-message"></p></form></section><section id="appPanel" class="seating-app hidden"><header class="seating-top"><div><p class="eyebrow">EDC Administration</p><h1>Seating Plan</h1><p id="saveStatus">Loaded locally</p></div><div class="top-actions"><select id="planSelect" aria-label="Open saved plan"></select><button id="newPlan">New Plan</button><button id="copyPlan">Copy</button><button id="renamePlan">Rename</button><button id="deletePlan" class="danger">Delete</button><button id="undoBtn">Undo</button><button id="redoBtn">Redo</button><button id="saveBtn" class="primary">Save</button></div></header><section id="stats" class="stats-grid"></section><section id="warnings" class="warning-list"></section><nav class="mobile-tabs"><button data-tab="guests" class="active">Guests</button><button data-tab="plan">Plan</button><button data-tab="settings">Settings</button></nav><div class="workspace"><aside class="panel guests-panel" data-panel="guests"><div class="panel-head"><h2>Unassigned Guests</h2><button id="addGuest">Add Guest</button></div><input id="guestSearch" placeholder="Search guests"><div class="filters"><select id="countryFilter"><option value="">All countries</option></select><select id="companyFilter"><option value="">All companies</option></select><select id="groupFilter"><option value="">All groups</option></select><label><input type="checkbox" id="vipFilter"> VIP</label></div><div class="import-box"><input id="importFile" type="file" accept=".xlsx,.xls,.csv,.txt"><button id="confirmImport" disabled>Confirm Import</button><div id="importPreview"></div></div><ul id="guestList" class="guest-list"></ul></aside><section class="plan-panel" data-panel="plan"><div class="canvas-toolbar"><button id="addTable">Add Table</button><button id="gridTables">Auto Grid</button><button id="resetLayout">Reset Layout</button><button id="zoomOut">−</button><button id="fitView">Fit</button><button id="zoomIn">+</button><button id="exportPdf">Export PDF</button><button id="exportCsv">CSV</button><button id="exportXlsx">XLSX</button><button onclick="window.print()">Print</button></div><div id="assignBar" class="assign-bar hidden"><span id="assignBarText"></span><button id="assignBarCancel">Cancel</button></div><div id="canvasViewport" class="canvas-viewport"><div id="canvas" class="canvas"></div></div></section><aside class="panel settings-panel" data-panel="settings"><h2>Event Configuration</h2><form id="eventForm" class="stack-form"><label>Event name<input name="name"></label><label>Event date<input name="date" type="date"></label><label>Location<input name="location"></label><label>Table count<input name="tableCount" type="number" min="0"></label><label>Default seats<input name="defaultSeats" type="number" min="0"></label><label>Notes<textarea name="notes"></textarea></label></form><div id="detailsPanel" class="details-panel"><h2>Details</h2><p>Select a table, chair, or guest.</p></div></aside></div></section></main></body></html>
